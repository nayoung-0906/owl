<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사회복지 실무역량</title>
    <style>
        /* 자연스럽고 신뢰감을 주는 초록색 테마 정의 */
        :root {
            --primary-color: #1b5e20; /* 깊은 숲 속 초록 */
            --secondary-color: #4caf50; /* 싱그러운 나뭇잎 연두 */
            --light-bg: #f4f9f4; /* 편안하고 연한 초록빛 배경 */
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #666666;
        }

        body {
            font-family: 'Malgun Gothic', dotum, sans-serif;
            background-color: var(--light-bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.7;
        }

        header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            text-align: center;
            padding: 3rem 1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        header h1 {
            margin: 0;
            font-size: 2.3rem;
            font-weight: bold;
            letter-spacing: -0.5px;
        }

        header p {
            margin: 0.8rem 0 0 0;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .container {
            max-width: 1140px;
            margin: 2.5rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(45%, 1fr));
            gap: 2rem;
        }

        /* 모바일 대응을 위한 미디어 쿼리 */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* 카드 보드 스타일 */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.8rem;
            box-shadow: 0 6px 18px rgba(0,0,0,0.04);
            border-top: 6px solid var(--primary-color);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .card h2 {
            margin-top: 0;
            color: var(--primary-color);
            font-size: 1.4rem;
            border-bottom: 2px solid #e8f5e9;
            padding-bottom: 0.7rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 1. 날씨 스타일 */
        .weather-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #e8f5e9;
            padding: 1rem 1.5rem;
            border-radius: 8px;
        }
        .weather-status {
            font-size: 1.05rem;
            font-weight: bold;
            color: #2e7d32;
        }
        .weather-temp {
            font-size: 2.2rem;
            font-weight: 800;
            color: #2e7d32;
        }

        /* 2 & 3. 리스트 스타일 (뉴스) */
        .news-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .news-list li {
            padding: 0.7rem 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .news-list li:last-child {
            border-bottom: none;
        }
        .news-list
