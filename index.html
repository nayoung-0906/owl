<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사회복지 실무역량</title>
    <style>
        /* 기본 자연스러운 파란색 테마 설정 */
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            margin: 0;
            padding: 40px 20px;
            color: #334155;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            color: #0369a1;
            font-size: 2.5rem;
            margin: 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        header p {
            color: #0c4a6e;
            margin-top: 10px;
            font-size: 1.1rem;
        }

        /* 메인 컨테이너 그리드 */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }

        /* 창모드(Card) 스타일 정의 */
        .window-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.7);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .window-card:hover {
            transform: translateY(-5px);
        }

        /* 창모드 상단 바 (타이틀 바) */
        .window-header {
            background: #0284c7;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .window-title {
            color: white;
            font-weight: bold;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 윈도우 조작 버튼 모양 (디자인 요소) */
        .window-buttons {
            display: flex;
            gap: 6px;
        }

        .btn-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .btn-close { background-color: #ef4444; }
        .btn-minimize { background-color: #f59e0b; }
        .btn-maximize { background-color: #10b981; }

        /* 창모드 내부 콘텐츠 */
        .window-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* 요소별 내부 스타일 */
        .weather-info {
            text-align: center;
            padding: 10px 0;
        }

        .weather-city {
            font-size: 1.3rem;
            font-weight: bold;
            color: #0369a1;
            margin-bottom: 10px;
        }

        .news-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .news-list li {
            margin-bottom: 12px;
            border-bottom: 1px
